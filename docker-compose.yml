services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-newsgraph}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p newsgraph 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 45s

  extractor:
    build: ./extractor
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-newsgraph}
      NEO4J_DATABASE: neo4j
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?set OPENROUTER_API_KEY in .env}
      LLM_MODEL: ${LLM_MODEL:-anthropic/claude-haiku-4.5}
      GRPC_PORT: "50051"
    volumes:
      # Persist the ~1.3 GB MMLW + spaCy models across rebuilds.
      - hf_cache:/app/.cache/huggingface
      - st_cache:/app/.cache/sentence-transformers
    depends_on:
      neo4j:
        condition: service_healthy

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-newsgraph}
      NEO4J_DATABASE: neo4j
      EXTRACTOR_TARGET: extractor:50051
      EXTRACTOR_DEADLINE_SECONDS: ${EXTRACTOR_DEADLINE_SECONDS:-600}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      neo4j:
        condition: service_healthy
      extractor:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
      VITE_HMR_CLIENT_PORT: "3000"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  neo4j_data:
  hf_cache:
  st_cache:
  frontend_node_modules:
