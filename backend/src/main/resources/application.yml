spring:
  application:
    name: newsgraph-api
  neo4j:
    uri: ${NEO4J_URI}
    authentication:
      username: ${NEO4J_USERNAME}
      password: ${NEO4J_PASSWORD}
    connection-timeout: 15s
  data:
    neo4j:
      database: ${NEO4J_DATABASE:neo4j}

server:
  port: 8080

newsgraph:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  extractor:
    target: ${EXTRACTOR_TARGET:localhost:50051}
    deadline-seconds: ${EXTRACTOR_DEADLINE_SECONDS:600}
